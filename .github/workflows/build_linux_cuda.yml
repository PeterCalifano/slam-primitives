name: build_linux_cuda
run-name: Build and test CUDA configuration

on:
  workflow_dispatch:
    inputs:
      enable_tbb:
        description: "Enable oneTBB on the CUDA runner"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: cuda-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    if: ${{ vars.CI_USE_SELF_HOSTED == 'true' }}
    runs-on:
      - self-hosted
      - Linux
      - X64
      - gpu
      - cuda
    timeout-minutes: 90
    env:
      BUILD_DIR: build_cuda_ci
      BUILD_TYPE: RelWithDebInfo
      CTEST_OUTPUT_ON_FAILURE: 1
      ENABLE_TBB: ${{ github.event.inputs.enable_tbb == 'true' && 'ON' || 'OFF' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate CUDA prerequisites
        run: |
          command -v cmake
          command -v ninja
          command -v g++
          command -v ccache
          command -v nvcc
          command -v nvidia-smi
          command -v python3
          nvidia-smi
          nvcc --version

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-cuda-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'src/**', 'tests/**', '.github/workflows/build_linux_cuda.yml') }}
          restore-keys: |
            ccache-cuda-${{ runner.os }}-${{ github.ref_name }}-
            ccache-cuda-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -S . -B "${BUILD_DIR}" -GNinja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DENABLE_TESTS=ON \
            -DENABLE_CUDA=ON \
            -DENABLE_TBB="${ENABLE_TBB}" \
            -DENABLE_OPENGL=OFF \
            -DCPU_ENABLE_NATIVE_TUNING=OFF \
            -DCUDA_ENABLE_FMAD=ON \
            -DCUDA_ENABLE_EXTRA_DEVICE_VECTORIZATION=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build "${BUILD_DIR}" --parallel 4

      - name: Test
        run: ctest --test-dir "${BUILD_DIR}" --output-on-failure --parallel 2 --no-tests=error

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats || true
