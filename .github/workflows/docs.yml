name: docs
run-name: Build API documentation

on:
  workflow_dispatch:
  push:
    branches:
      - "master"
      - "main"
      - "dev_main"
    paths:
      - "src/**"
      - "cmake/**"
      - "doc/**"
      - "README.md"
      - "CMakeLists.txt"
      - ".github/workflows/docs.yml"
  pull_request:
    branches:
      - "master"
      - "main"
      - "dev_main"
      - "dev*"
    paths:
      - "src/**"
      - "cmake/**"
      - "doc/**"
      - "README.md"
      - "CMakeLists.txt"
      - ".github/workflows/docs.yml"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BUILD_DIR: build_docs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build g++ libeigen3-dev python3-dev doxygen graphviz

      - name: Configure docs
        run: |
          cmake -S . -B "${BUILD_DIR}" -GNinja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DENABLE_TESTS=OFF \
            -DENABLE_CUDA=OFF \
            -DENABLE_OPENGL=OFF \
            -DBUILD_DOC_XML=ON \
            -DCPU_ENABLE_NATIVE_TUNING=OFF

      - name: Build docs
        run: |
          cmake --build "${BUILD_DIR}" --target doc --parallel 2
          test -f "${BUILD_DIR}/doc/html/index.html"
          test -d "${BUILD_DIR}/doc/xml"

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: slam-primitives-docs
          path: |
            ${{ env.BUILD_DIR }}/doc/html
            ${{ env.BUILD_DIR }}/doc/xml
          if-no-files-found: error
          retention-days: 7
